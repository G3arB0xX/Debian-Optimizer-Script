# ==============================================================================
# IP-Sentinel 单机精简版 v2.0 - 配置文件
# 生成时间：手动填写
# 说明：本文件由 install.sh 自动生成，也可手动编辑
# ==============================================================================

# ------------------------------------------------------------------------------
# [必填] 区域代码
# 可用值：JP / SG / KR / HK / TW / MY / VN
#          UK / DE / FR / NL / ES
#          US / CA / AU / NG
# 该值决定：加载哪份关键词库(kw_XX.txt)、拉取哪个城市的 JSON
# ------------------------------------------------------------------------------
REGION_CODE="JP"

# ------------------------------------------------------------------------------
# [可选] 绑定出口 IP
# 填写本机公网 IP（IPv4 或 IPv6 均可）
# 留空则每次运行时自动检测，适合 IP 固定的 VPS
# 有多个 IP 的机器请明确填写，避免流量从错误的网卡出
# 示例：BIND_IP="1.2.3.4"  或  BIND_IP="2001:db8::1"
# ------------------------------------------------------------------------------
BIND_IP=""

# ------------------------------------------------------------------------------
# [可选] IP 协议偏好
# 4 = 强制 IPv4，6 = 强制 IPv6
# 留空时脚本根据 BIND_IP 格式自动判断
# ------------------------------------------------------------------------------
IP_PREF="4"

# ------------------------------------------------------------------------------
# [可选] 功能模块开关
# ENABLE_GOOGLE：Google 区域纠偏（修正 IP 地理位置，解决"送中"问题）
# ENABLE_TRUST ：IP 信用净化（访问当地权威网站，降低 Scamalytics 等风控评分）
# 两者均开启时，每次运行 70% 概率跑 Google 模块，30% 概率跑 Trust 模块
# ------------------------------------------------------------------------------
ENABLE_GOOGLE="true"
ENABLE_TRUST="true"

# ------------------------------------------------------------------------------
# [可选] Telegram 推送
# 留空则完全不推送，不影响脚本正常运行
# TG_TOKEN：从 @BotFather 获取的机器人 Token
# CHAT_ID ：你的 Telegram 用户 ID（从 @userinfobot 获取）
# ------------------------------------------------------------------------------
TG_TOKEN=""
CHAT_ID=""

# ------------------------------------------------------------------------------
# [自动] 以下参数由 install.sh 自动写入，通常无需手动修改
# ------------------------------------------------------------------------------
INSTALL_DIR="/opt/ip_sentinel"
LOG_FILE="/opt/ip_sentinel/logs/sentinel.log"
