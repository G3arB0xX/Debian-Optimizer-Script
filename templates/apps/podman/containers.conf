# Podman 引擎配置 — apps 用户 rootless 运行
# 路径: /home/apps/.config/containers/containers.conf
# 修改后执行: apppod system migrate（仅在 subuid 变更时需要）

[containers]
# 日志写入 journald，避免 json-file 占满磁盘
log_driver = "journald"
# 单容器内存日志缓冲上限 50MB
log_size_max = 52428800

[engine]
# 由 systemd 管理 cgroup（rootless 推荐）
cgroup_manager = "systemd"
# 事件日志写入 journald，便于 applog / journalctl 统一查看
events_logger = "journald"
{{SQLITE_BACKEND}}
# 关闭端口预留守护，减少空闲内存占用
enable_port_reservation = false
{{ACTIVE_SERVICE}}
