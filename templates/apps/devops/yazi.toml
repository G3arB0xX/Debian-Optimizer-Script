# =================================================================
# Yazi 全局行为优化配置 (General Settings)
# =================================================================

[mgr]
# 界面比例：左侧父级目录、中间当前目录、右侧预览窗口（预览约占 56% 宽度）
ratio = [1, 3, 5]

# 列表行右侧默认显示最后修改时间（运行时可用 m,m / m,p / m,o 等切换）
linemode = "mtime"

# 默认排序方式：文件夹置顶，其余按文件名自然数升序（1.md < 2.md < 10.md）
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true

# 默认显示隐藏文件（以 . 开头的文件/文件夹），可在 Yazi 中按 . 键切换
show_hidden = true

# 显示软链指向的真实路径
show_symlink = true

[preview]
# 长行自动换行，便于阅读代码与日志
wrap = "yes"

# 图片预览上限：设得足够大，在支持上报像素尺寸的终端中由预览区/终端实际大小决定显示尺寸
# 修改后需执行 yazi --clear-cache 并完全重启 Yazi
max_width = 10000
max_height = 10000

# 缓存目录
cache_dir = "~/.cache/yazi"

[opener]
edit = [
    { run = 'micro "$@"', block = true, desc = "Edit", for = "unix" }
]

[open]
prepend_rules = [
    { mime = "text/*", use = "edit" },
    { mime = "application/json", use = "edit" },
    { mime = "application/javascript", use = "edit" },
    { mime = "", use = "edit" }
]
