# =================================================================
# Yazi 快捷键配置 (Windows / Micro 风格优先)
# =================================================================

# ----------------- 文件基本操作 (Copy / Cut / Paste / Delete) -----------------
[[mgr.prepend_keymap]]
on   = [ "<C-c>" ]
run  = "yank"
desc = "复制选中文件 (Yank)"

[[mgr.prepend_keymap]]
on   = [ "<C-x>" ]
run  = "yank --cut"
desc = "剪切选中文件"

[[mgr.prepend_keymap]]
on   = [ "<C-v>" ]
run  = "paste"
desc = "粘贴文件"

[[mgr.prepend_keymap]]
on   = [ "<Delete>" ]
run  = "remove"
desc = "将选中文件移入回收站"

[[mgr.prepend_keymap]]
on   = [ "<S-Delete>" ]
run  = "remove --permanently"
desc = "永久删除选中文件"

# ----------------- 搜索、选择、新建与退出 -----------------
[[mgr.prepend_keymap]]
on   = [ "<C-a>" ]
run  = "select_all --state=true"
desc = "全选当前目录下文件"

[[mgr.prepend_keymap]]
on   = [ "<Esc>" ]
run  = "escape --select"
desc = "取消所有选中状态"

[[mgr.prepend_keymap]]
on   = [ "<C-n>" ]
run  = "create"
desc = "新建文件或文件夹 (加/结尾为文件夹)"

[[mgr.prepend_keymap]]
on   = [ "<F2>" ]
run  = "rename --cursor=before_ext"
desc = "重命名文件 (光标定位在后缀名前)"

[[mgr.prepend_keymap]]
on   = [ "<C-f>" ]
run  = "filter --smart"
desc = "开启实时搜索/过滤文件"

[[mgr.prepend_keymap]]
on   = [ "<C-p>" ]
run  = "search --via=fd"
desc = "全局模糊搜索文件名 (fd)"

[[mgr.prepend_keymap]]
on   = [ "<C-S-f>" ]
run  = "search --via=rg"
desc = "全局模糊搜索文件内容 (ripgrep)"

[[mgr.prepend_keymap]]
on   = [ "<C-q>" ]
run  = "quit"
desc = "退出 Yazi"

[[mgr.prepend_keymap]]
on   = [ "<C-Space>" ]
run  = "toggle"
desc = "选中/取消选中当前文件"

# ----------------- 辅助与导航 -----------------
[[mgr.prepend_keymap]]
on   = [ "<Enter>" ]
run  = "open"
desc = "打开选中的文件/进入目录"

[[mgr.prepend_keymap]]
on   = [ "<Right>" ]
run  = "enter"
desc = "进入目录"

[[mgr.prepend_keymap]]
on   = [ "<Left>" ]
run  = "leave"
desc = "返回上一级目录"

[[mgr.prepend_keymap]]
on   = [ "<Backspace>" ]
run  = "leave"
desc = "返回上一级目录"

[[mgr.prepend_keymap]]
on   = [ "<A-Up>" ]
run  = "leave"
desc = "返回上一级目录"

[[mgr.prepend_keymap]]
on   = [ "<A-Left>" ]
run  = "back"
desc = "回退历史目录"

[[mgr.prepend_keymap]]
on   = [ "<A-Right>" ]
run  = "forward"
desc = "前进历史目录"

[[mgr.prepend_keymap]]
on   = [ "<Up>" ]
run  = "arrow -1"
desc = "光标上移"

[[mgr.prepend_keymap]]
on   = [ "<Down>" ]
run  = "arrow 1"
desc = "光标下移"

[[mgr.prepend_keymap]]
on   = [ "<Home>" ]
run  = "arrow top"
desc = "跳转到首个文件"

[[mgr.prepend_keymap]]
on   = [ "<End>" ]
run  = "arrow bot"
desc = "跳转到末尾文件"

[[mgr.prepend_keymap]]
on   = [ "<PageUp>" ]
run  = "arrow -100%"
desc = "向上翻页"

[[mgr.prepend_keymap]]
on   = [ "<PageDown>" ]
run  = "arrow 100%"
desc = "向下翻页"
