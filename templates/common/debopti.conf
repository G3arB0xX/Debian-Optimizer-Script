# =========================================================
# Debian Optimizer Script 全局持久化配置文件
# =========================================================

# 是否位于中国大陆 (true/false)
# 用于自动切换 APT 镜像、GitHub 加速以及环境变量代理
IS_CN_REGION=""

# 基础优化完成标记 (true/false)
# 标记系统是否已完成内核调优、安全加固等基础流程
BASE_OPTIMIZED="false"

# 脚本安装标记 (true/false)
# 标记脚本是否已完成自举安装并绑定全局命令
INSTALLED="false"

# SSH 安全加固标记 (true/false)
# 标记是否已完成密钥登录强制化与端口随机化
SSH_HARDENED="false"

# 默认使用的文本编辑器
EDITOR_CMD="micro"

# Podman 镜像清理定时器状态 (true/false)
# 由 TUI 选项管理，安装时默认开启
PODMAN_GC_ENABLED="false"
